<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>AI Landscape</title>
<style>
  :root{
    --bg:#f7f7f5; --paper:#fff; --bar:#ff6600; --ink:#1d1f25; --meta:#9aa0aa; --sub:#6b7280;
    --line:#e6e6e2; --rule:#efefe9; --hl:#fff7f0; --blue:#2d7ff9; --good:#0a7c42; --bad:#d1453b;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px}
  a{color:var(--blue);text-decoration:none} a:hover{text-decoration:underline}
  button{font-family:var(--sans);cursor:pointer}
  .note{font-family:var(--mono);font-size:10px;color:#bcbcb4;text-align:center;padding:2px}

  /* login */
  #login{min-height:80vh;display:flex;align-items:center;justify-content:center}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:30px;max-width:380px;width:90%}
  .logo{background:var(--bar);color:#fff;font-weight:700;padding:3px 8px;border-radius:3px}
  h1{font-size:21px;margin:14px 0 2px}
  .tagl{color:var(--meta);font-size:12px}
  #login input{width:100%;border:1px solid #d6d6d0;border-radius:5px;padding:9px 11px;margin-top:14px;font-size:13px}
  #sendBtn{background:var(--bar);color:#fff;border:0;border-radius:5px;padding:9px 16px;font-weight:700;margin-top:12px;font-size:13px}
  .msg{margin-top:12px;font-size:12px;color:var(--meta)} .msg.err{color:var(--bad)}

  /* shell */
  #app{display:none}
  .top{background:var(--bar);color:#fff;display:flex;align-items:center;gap:6px;padding:0 12px;height:42px}
  .top .brand{font-weight:700;margin-right:10px}
  .ttab{color:#ffe2cc;padding:6px 12px;border-radius:5px 5px 0 0;cursor:pointer;font-size:13px}
  .ttab.active{background:var(--bg);color:var(--ink);font-weight:600}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .top .who{color:#ffe2cc;font-size:11px;font-family:var(--mono)}
  .top .gh{background:rgba(255,255,255,.2);color:#fff;border:0;border-radius:4px;padding:4px 9px;font-size:11px}

  .toolbar{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap;position:relative}
  .vtab{font-size:12px;color:var(--sub);padding:5px 9px;border-radius:5px;cursor:pointer;display:flex;gap:4px;align-items:center}
  .vtab.active{background:#eef1f6;color:var(--ink);font-weight:600}
  .tb{font-size:12px;color:var(--sub);background:transparent;border:0;padding:5px 9px;border-radius:5px;display:flex;gap:5px;align-items:center}
  .tb:hover{background:#f0f0ec}
  .tb.on{color:var(--blue);background:#eaf2ff}
  .sep{width:1px;height:18px;background:var(--line);margin:0 2px}
  .search{border:1px solid #e0e0da;border-radius:5px;padding:5px 9px;font-size:12px;width:180px}
  .count{margin-left:auto;color:var(--meta);font-size:11px;font-family:var(--mono)}
  .newbtn{background:var(--bar);color:#fff;border:0;border-radius:5px;padding:5px 11px;font-size:12px;font-weight:600}

  .panel{position:absolute;top:44px;left:12px;z-index:30;background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.14);padding:11px;min-width:300px;display:none}
  .panel.show{display:block}
  .cond{display:flex;gap:5px;margin-bottom:6px;align-items:center}
  .cond select,.cond input{border:1px solid #e0e0da;border-radius:4px;padding:4px 6px;font-size:12px}
  .cond .x{color:var(--meta);cursor:pointer;padding:0 4px}
  .addcond{font-size:12px;color:var(--blue);background:0;border:0;padding:4px 0;cursor:pointer}

  /* grid */
  .scroll{overflow:auto;height:calc(100vh - 128px)}
  table.g{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;background:var(--paper)}
  .g th{position:sticky;top:0;z-index:5;background:#fafafa;text-align:left;font-size:11px;color:var(--sub);font-weight:600;
    text-transform:uppercase;letter-spacing:.3px;padding:7px 9px;border-bottom:1px solid var(--line);border-right:1px solid var(--rule);white-space:nowrap;cursor:pointer}
  .g th:hover{background:#f1f1ee} .g th .ar{color:var(--bar)}
  .g td{padding:0;border-bottom:1px solid var(--rule);border-right:1px solid var(--rule);vertical-align:middle;background:var(--paper)}
  .g tr:hover td{background:#fcfcfb}
  .cell{padding:6px 9px;min-height:30px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
  .cell.sel,.cell.rate,.cell.chk{cursor:pointer}
  .g td.exp{width:30px;text-align:center;cursor:pointer;color:var(--meta)} .g td.exp:hover{color:var(--bar)}
  .grp{background:#f0f0ec;font-weight:600;font-size:12px;color:var(--sub);padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--line)}
  .grp .c{color:var(--meta);font-weight:400;margin-left:6px}
  .chip{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
  .rate{font-family:var(--mono);font-weight:700}
  .rb{display:inline-block;width:20px;text-align:center;border-radius:4px;color:#fff;font-size:11px}
  input.editor,select.editor{width:100%;border:2px solid var(--blue);border-radius:3px;padding:5px 7px;font-size:13px;font-family:var(--sans);outline:none}
  .lnk{color:var(--blue)}
  .chk input{width:15px;height:15px;accent-color:var(--bar);cursor:pointer;display:block;margin:0 auto}

  /* kanban */
  .kan{display:flex;gap:12px;padding:12px;overflow-x:auto;height:calc(100vh - 128px);align-items:flex-start}
  .kcol{background:#f0f0ec;border-radius:8px;min-width:270px;max-width:270px;flex:0 0 auto;max-height:100%;display:flex;flex-direction:column}
  .kcol h4{margin:0;padding:9px 11px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
  .kcol .body{padding:0 8px 8px;overflow-y:auto}
  .kcol.over{outline:2px dashed var(--bar);outline-offset:-2px}
  .kc{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:9px;margin-bottom:7px;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .kc:active{cursor:grabbing} .kc .t{font-weight:600;font-size:12.5px;margin-bottom:4px}
  .kc .m{color:var(--meta);font-size:11px;font-family:var(--mono);display:flex;gap:6px;flex-wrap:wrap;align-items:center}

  /* calendar */
  .cal{padding:12px} .calhd{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .calhd b{font-size:15px} .calnav{background:#eee;border:0;border-radius:5px;padding:4px 10px;cursor:pointer}
  .cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .cdow{background:#fafafa;padding:5px;font-size:11px;color:var(--sub);text-align:center;font-weight:600}
  .cday{background:var(--paper);min-height:92px;padding:4px}
  .cday .d{font-size:11px;color:var(--meta)} .cday.out{background:#fbfbf9}
  .cev{background:var(--hl);border-left:3px solid var(--bar);border-radius:3px;padding:2px 5px;margin-top:3px;font-size:11px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cev.cdl{background:#fdeaea;border-left-color:var(--bad);color:#8a2a22}

  /* modal */
  .ov{position:fixed;inset:0;background:rgba(20,20,25,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;overflow:auto;padding:40px 14px}
  .ov.show{display:flex}
  .modal{background:var(--paper);border-radius:10px;max-width:680px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .mh{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
  .mh b{font-size:15px} .mh .x{font-size:20px;color:var(--meta);cursor:pointer;background:0;border:0}
  .mb{padding:8px 18px 18px;max-height:70vh;overflow:auto}
  .fld{display:grid;grid-template-columns:140px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid var(--rule);align-items:start}
  .fld label{color:var(--sub);font-size:12px;padding-top:6px}
  .fld input,.fld select,.fld textarea{width:100%;border:1px solid #e0e0da;border-radius:5px;padding:7px 9px;font-size:13px;font-family:var(--sans)}
  .fld textarea{min-height:64px;resize:vertical;line-height:1.5}
  .mf{display:flex;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--line)}
  .del{color:var(--bad);background:0;border:1px solid #f0d0cc;border-radius:5px;padding:6px 12px;font-size:12px}
  .saved{color:var(--good);font-size:11px;font-family:var(--mono)}
  .empty{color:var(--meta);font-style:italic;padding:20px}
</style>
</head>

const CONFIG={
  activities:{label:'Activities',table:'activities',title:'headline',views:['grid','kanban','calendar'],group:'type',dateField:'event_date',
    fields:[
      {k:'event_date',label:'Date',type:'date',w:104},

      {k:'relevance_to_me',label:'Why it matters',type:'longtext',modal:1},

    ]},
  companies:{label:'Companies',table:'companies',title:'name',views:['grid','kanban'],group:'relevance',
    fields:[
      {k:'name',label:'Name',type:'text',w:180},
      {k:'status',label:'Status',type:'select',opts:['WATCH','ENGAGED','MONITOR'],colors:COL.status,w:110},
      {k:'relevance',label:'Relevance',type:'select',opts:['core','radar'],colors:COL.relevance,w:96},
      {k:'category',label:'Category',type:'text',w:200},
      {k:'hq_country',label:'Country',type:'text',w:120},

      {k:'five_eyes',label:'FVEY',type:'checkbox',w:60},
      {k:'website',label:'Site',type:'url',w:50},

      {k:'sovereignty_note',label:'Sovereignty',type:'longtext',modal:1},
      {k:'tags',label:'Tags',type:'tags',modal:1}
    ]},
  contacts:{label:'Who to Meet',table:'contacts',title:'full_name',views:['grid','kanban'],group:'status',
    fields:[
      {k:'full_name',label:'Name',type:'text',w:170},
      {k:'title',label:'Title',type:'text',w:160},
      {k:'company_name',label:'Company',type:'text',w:140},
      {k:'status',label:'Status',type:'select',opts:['to-reach','contacted','connected','passed'],colors:COL.cstatus,w:116},
      {k:'priority',label:'Pri',type:'rating',w:54},
      {k:'linkedin_url',label:'in',type:'url',w:44},

    fields:[

    fields:[

    ]},

const fieldOf=(t,k)=>CONFIG[t].fields.find(f=>f.k===k);
const gridFields=t=>CONFIG[t].fields.filter(f=>!f.modal);

let DATA={activities:[],companies:[],contacts:[],digest_items:[],conferences:[]};
let cur='activities';
const ST={};
for(const t in CONFIG) ST[t]={view:'grid',sort:{col:CONFIG[t].fields[0].k,dir:1},group:'',search:'',filters:[],calMonth:null,collapsed:new Set()};

/* ---------- auth ---------- */
async function init(){const {data:{session}}=await sb.auth.getSession();
  if(session&&session.user?.email?.toLowerCase()===OWNER) showApp(session); else $('#login').style.display='flex';}
sb.auth.onAuthStateChange((_e,s)=>{if(s&&s.user?.email?.toLowerCase()===OWNER) showApp(s);});
$('#sendBtn').onclick=async()=>{const email=$('#email').value.trim(),m=$('#loginMsg');m.className='msg';
  if(!email){m.textContent='Enter your email.';return;} m.textContent='Sending...';
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split('#')[0]}});
  m.className='msg'+(error?' err':'');m.textContent=error?error.message:'Check your email and click the login link.';};
$('#signout').onclick=async()=>{await sb.auth.signOut();location.reload();};
async function showApp(s){$('#login').style.display='none';$('#app').style.display='block';$('#whoami').textContent=s.user.email;
  renderTabs();await loadAll();}
$('#refreshBtn').onclick=loadAll;

async function loadAll(){
  const [a,c,k,dg,cf,sw]=await Promise.all([
    sb.from('activities').select('*'),sb.from('companies').select('*'),sb.from('contacts').select('*'),
    sb.from('digest_items').select('*'),sb.from('conferences').select('*'),
    sb.from('sweep_runs').select('ran_at').order('ran_at',{ascending:false}).limit(1)]);
  DATA.activities=a.data||[];DATA.companies=c.data||[];DATA.contacts=k.data||[];DATA.digest_items=dg.data||[];DATA.conferences=cf.data||[];
  if(sw.data&&sw.data[0])$('#sweepInfo').textContent='sweep '+new Date(sw.data[0].ran_at).toISOString().slice(0,10);
  render();
}

/* ---------- tabs ---------- */
function renderTabs(){
  $('#ttabs').innerHTML=Object.keys(CONFIG).map(t=>`<span class="ttab ${t===cur?'active':''}" data-t="${t}">${esc(CONFIG[t].label)}</span>`).join('');
  $('#ttabs').querySelectorAll('.ttab').forEach(e=>e.onclick=()=>{cur=e.dataset.t;closePanels();renderTabs();render();});
}
function renderVtabs(){
  const icons={grid:'▦ Grid',kanban:'▤ Kanban',calendar:'▦ Calendar'};
  $('#vtabs').innerHTML=CONFIG[cur].views.map(v=>`<span class="vtab ${ST[cur].view===v?'active':''}" data-v="${v}">${icons[v]}</span>`).join('');
  $('#vtabs').querySelectorAll('.vtab').forEach(e=>e.onclick=()=>{ST[cur].view=e.dataset.v;closePanels();render();});
}

/* ---------- data helpers ---------- */
function rowsFor(t){
  const s=ST[t]; let rows=[...DATA[t]];
  const q=s.search.toLowerCase();
  if(q) rows=rows.filter(r=>CONFIG[t].fields.some(f=>String(r[f.k]??'').toLowerCase().includes(q)));
  for(const c of s.filters){ if(!c.field) continue; const f=fieldOf(t,c.field);
    rows=rows.filter(r=>matchCond(r,f,c)); }
  const sc=s.sort.col,dir=s.sort.dir;
  rows.sort((a,b)=>{let x=a[sc],y=b[sc];
    if(typeof x==='boolean')x=x?1:0; if(typeof y==='boolean')y=y?1:0;
    if(typeof x==='string')x=x.toLowerCase(); if(typeof y==='string')y=y.toLowerCase();
    if(x==null)x=-Infinity; if(y==null)y=-Infinity; return (x<y?-1:x>y?1:0)*dir;});
  return rows;
}
function matchCond(r,f,c){const v=r[f.k];
  switch(c.op){
    case 'contains':return String(v??'').toLowerCase().includes((c.val||'').toLowerCase());
    case 'is':return String(v??'')===c.val;
    case 'isnot':return String(v??'')!==c.val;
    case 'empty':return v==null||v==='';
    case 'notempty':return !(v==null||v==='');
    case 'gte':return (+v||0)>=(+c.val||0);
    case 'lte':return (+v||0)<=(+c.val||0);
    case 'eq':return (+v||0)===(+c.val||0);
    case 'checked':return v===true;
    case 'unchecked':return v!==true;
    case 'before':return v&&v<c.val; case 'after':return v&&v>c.val; case 'on':return v===c.val;
    default:return true;
  }
}

/* ---------- render dispatch ---------- */
function render(){
  renderVtabs();
  $('#btnGroup').classList.toggle('on',!!ST[cur].group);
  $('#btnFilter').classList.toggle('on',ST[cur].filters.length>0);
  $('#search').value=ST[cur].search;
  const v=ST[cur].view;
  if(v==='kanban')renderKanban(); else if(v==='calendar')renderCalendar(); else renderGrid();
}
$('#search').oninput=e=>{ST[cur].search=e.target.value;render();};
$('#btnNew').onclick=addRow;

/* ---------- GRID ---------- */
function cellDisplay(r,f){
  const v=r[f.k];
  if(f.type==='checkbox')return `<div class="chk"><input type="checkbox" data-k="${f.k}" ${v?'checked':''}></div>`;
  if(f.type==='url')return v?`<div class="cell"><a class="lnk" href="${esc(v)}" target="_blank" rel="noopener">↗</a></div>`:`<div class="cell"></div>`;
  if(f.type==='select'){const c=(f.colors&&f.colors[v])||['#ececE4','#666'];return `<div class="cell sel" data-k="${f.k}">${v?`<span class="chip" style="background:${c[0]};color:${c[1]}">${esc(v)}</span>`:''}</div>`;}
  if(f.type==='rating')return `<div class="cell rate" data-k="${f.k}">${v?`<span class="rb" style="background:${rateColor(v)}">${v}</span>`:''}</div>`;
  return `<div class="cell" data-k="${f.k}">${esc(v??'')}</div>`;
}
function renderGrid(){
  const t=cur,s=ST[t],fs=gridFields(t),rows=rowsFor(t);
  $('#count').textContent=`${rows.length} of ${DATA[t].length}`;
  const head=`<tr><th class="exp" style="cursor:default"></th>`+fs.map(f=>{const a=s.sort.col===f.k?`<span class="ar">${s.sort.dir>0?'▲':'▼'}</span>`:'';return `<th data-k="${f.k}" style="min-width:${f.w}px">${esc(f.label)} ${a}</th>`;}).join('')+`</tr>`;
  let body='';
  if(s.group){
    const gf=fieldOf(t,s.group),groups={};
    rows.forEach(r=>{const g=r[s.group]??'—';(groups[g]=groups[g]||[]).push(r);});
    Object.keys(groups).sort().forEach(g=>{
      const open=!s.collapsed.has(g);
      body+=`<tr><td class="grp" colspan="${fs.length+1}" data-g="${esc(g)}">${open?'▾':'▸'} ${esc(g)}<span class="c">${groups[g].length}</span></td></tr>`;
      if(open)groups[g].forEach(r=>body+=rowHTML(t,r,fs));
    });
  } else rows.forEach(r=>body+=rowHTML(t,r,fs));
  $('#container').innerHTML=`<div class="scroll"><table class="g"><thead>${head}</thead><tbody>${body||`<tr><td class="empty" colspan="${fs.length+1}">No records.</td></tr>`}</tbody></table></div>`;
  bindGrid(t,fs);
}
function rowHTML(t,r,fs){return `<tr data-id="${r.id}"><td class="exp" data-exp="1">⤢</td>`+fs.map(f=>`<td>${cellDisplay(r,f)}</td>`).join('')+`</tr>`;}

function bindGrid(t,fs){
  $('#container').querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k,s=ST[t];if(s.sort.col===k)s.sort.dir*=-1;else s.sort={col:k,dir:1};render();});
  $('#container').querySelectorAll('.grp').forEach(g=>g.onclick=()=>{const k=g.dataset.g,s=ST[t];s.collapsed.has(k)?s.collapsed.delete(k):s.collapsed.add(k);render();});
  $('#container').querySelectorAll('td.exp[data-exp]').forEach(td=>td.onclick=()=>openRecord(t,td.closest('tr').dataset.id));
  $('#container').querySelectorAll('.chk input').forEach(b=>b.onchange=async e=>{const id=e.target.closest('tr').dataset.id;await save(t,id,{[e.target.dataset.k]:e.target.checked});});
  $('#container').querySelectorAll('.cell[data-k]').forEach(c=>{const f=fieldOf(t,c.dataset.k);if(f.type==='url')return;
    c.onclick=()=>editCell(t,c.closest('tr').dataset.id,f,c);});
}
async function editCell(t,id,f,cell){
  if(f.type==='longtext'){openRecord(t,id);return;}
  const r=DATA[t].find(x=>x.id===id),v=r[f.k];
  let ed;
  if(f.type==='select'||f.type==='rating'){
    ed=document.createElement('select');ed.className='editor';
    const opts=f.type==='rating'?['','1','2','3','4','5']:['',...f.opts];
    ed.innerHTML=opts.map(o=>`<option ${String(v??'')===String(o)?'selected':''}>${o}</option>`).join('');
  }else{ed=document.createElement('input');ed.className='editor';ed.type=f.type==='date'?'date':f.type==='number'?'number':'text';ed.value=v??'';}
  cell.replaceWith(ed);ed.focus();if(ed.select)ed.select();
  const commit=async()=>{let nv=ed.value;if(f.type==='number'||f.type==='rating')nv=nv===''?null:+nv;if(nv==='')nv=null;
    if(String(nv??'')!==String(v??'')) await save(t,id,{[f.k]:nv}); else render();};
  ed.onblur=commit; ed.onkeydown=e=>{if(e.key==='Enter'){ed.blur();}if(e.key==='Escape')render();};
  if(f.type==='select'||f.type==='rating')ed.onchange=commit;
}

/* ---------- KANBAN ---------- */
function kanField(t){const g=ST[t].group; if(g&&fieldOf(t,g).type==='select')return g; return CONFIG[t].group;}
function renderKanban(){
  const t=cur,gf=fieldOf(t,kanField(t)),rows=rowsFor(t);
  $('#count').textContent=`${rows.length} of ${DATA[t].length}`;
  const cols=[...gf.opts,...(rows.some(r=>!r[gf.k])?['—']:[])];
  const groups={};cols.forEach(c=>groups[c]=[]);rows.forEach(r=>{const g=r[gf.k]||'—';(groups[g]=groups[g]||[]).push(r);});
  const tf=CONFIG[t].title;
  let h='<div class="kan">';
  cols.forEach(c=>{const col=(gf.colors&&gf.colors[c])||['#ececE4','#666'];
    h+=`<div class="kcol" data-col="${esc(c)}"><h4><span class="chip" style="background:${col[0]};color:${col[1]}">${esc(c)}</span><span style="color:var(--meta)">${groups[c].length}</span></h4><div class="body">`;
    h+=groups[c].map(r=>`<div class="kc" draggable="true" data-id="${r.id}"><div class="t">${esc(r[tf]||'(untitled)')}</div><div class="m">${kcMeta(t,r)}</div></div>`).join('');
    h+='</div></div>';});
  h+='</div>';
  $('#container').innerHTML=h;
  $('#container').querySelectorAll('.kc').forEach(c=>{
    c.ondblclick=()=>openRecord(t,c.dataset.id);
    c.ondragstart=e=>{e.dataTransfer.setData('id',c.dataset.id);};});
  $('#container').querySelectorAll('.kcol').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.classList.add('over');};
    col.ondragleave=()=>col.classList.remove('over');
    col.ondrop=async e=>{e.preventDefault();col.classList.remove('over');const id=e.dataTransfer.getData('id');let val=col.dataset.col;if(val==='—')val=null;await save(t,id,{[gf.k]:val});};});
}
function kcMeta(t,r){
  if(t==='activities')return `<span>${esc(r.event_date||'')}</span><span class="rb" style="background:${rateColor(r.relevance_score)};color:#fff">${r.relevance_score||'-'}</span><span>${esc(r.company_name||'')}</span>`;
  if(t==='companies')return `<span>${esc(r.category||'')}</span><span>${esc(r.hq_country||'')}</span>`;
  if(t==='digest_items')return `<span>${esc(r.digest_date||'')}</span>${r.trl7?'<span class="rb" style="background:#ff6600;color:#fff">7+</span>':''}<span>${esc(r.source_name||'')}</span>`;
  return `<span>${esc(r.title||'')}</span><span>${esc(r.company_name||'')}</span>`;
}

/* ---------- CALENDAR ---------- */
function renderCalendar(){
  const t=cur,conf=CONFIG[t],s=ST[t];
  const marks=conf.calMarks||[{field:conf.dateField,kind:'event'}];
  const rows=rowsFor(t);
  const byDay={};
  rows.forEach(r=>marks.forEach(m=>{const d=r[m.field];if(d){(byDay[d]=byDay[d]||[]).push({r,m});}}));
  if(!s.calMonth){
    if(conf.calDefault==='now')s.calMonth=new Date().toISOString().slice(0,7);
    else{const ds=Object.keys(byDay).sort();s.calMonth=(ds[ds.length-1]||new Date().toISOString()).slice(0,7);}
  }
  const [Y,M]=s.calMonth.split('-').map(Number);
  const first=new Date(Y,M-1,1),start=new Date(first);start.setDate(1-first.getDay());
  let placements=0;Object.values(byDay).forEach(a=>placements+=a.length);
  $('#count').textContent=`${placements} dated`;
  let h=`<div class="cal"><div class="calhd"><button class="calnav" id="cPrev">‹</button><b>${first.toLocaleString('en',{month:'long'})} ${Y}</b><button class="calnav" id="cNext">›</button><span style="color:var(--meta);font-size:11px">orange = event · red ⚑ = deadline</span></div><div class="cgrid">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>h+=`<div class="cdow">${d}</div>`);
  for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=d.toISOString().slice(0,10);const out=d.getMonth()!==M-1;
    h+=`<div class="cday ${out?'out':''}"><div class="d">${d.getDate()}</div>`;
    (byDay[iso]||[]).forEach(p=>{const dl=p.m.kind==='deadline',ttl=esc(p.r[conf.title]);
      h+=`<div class="cev ${dl?'cdl':''}" data-id="${p.r.id}" title="${dl?'Deadline — ':''}${ttl}">${dl?'⚑ ':''}${ttl}</div>`;});
    h+='</div>';}
  h+='</div></div>';
  $('#container').innerHTML=h;
  $('#cPrev').onclick=()=>{s.calMonth=shiftMonth(s.calMonth,-1);render();};
  $('#cNext').onclick=()=>{s.calMonth=shiftMonth(s.calMonth,1);render();};
  $('#container').querySelectorAll('.cev').forEach(e=>e.onclick=()=>openRecord(t,e.dataset.id));
}
function shiftMonth(ym,d){let [Y,M]=ym.split('-').map(Number);M+=d;if(M<1){M=12;Y--;}if(M>12){M=1;Y++;}return `${Y}-${String(M).padStart(2,'0')}`;}

/* ---------- RECORD MODAL ---------- */
let modalRec=null;
function openRecord(t,id){
  const r=DATA[t].find(x=>x.id===id);if(!r)return;modalRec={t,id};
  $('#mTitle').textContent=r[CONFIG[t].title]||'Record';
  $('#mBody').innerHTML=CONFIG[t].fields.map(f=>{
    const v=r[f.k];let ctl;
    if(f.type==='checkbox')ctl=`<input type="checkbox" data-k="${f.k}" ${v?'checked':''} style="width:18px;height:18px">`;
    else if(f.type==='longtext')ctl=`<textarea data-k="${f.k}">${esc(v??'')}</textarea>`;
    else if(f.type==='select')ctl=`<select data-k="${f.k}"><option value="">—</option>${f.opts.map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;
    else if(f.type==='rating')ctl=`<select data-k="${f.k}"><option value="">—</option>${[1,2,3,4,5].map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('')}</select>`;
    else if(f.type==='tags')ctl=`<input data-k="${f.k}" data-tags="1" value="${esc(Array.isArray(v)?v.join(', '):(v||''))}" placeholder="comma, separated">`;
    else ctl=`<input data-k="${f.k}" type="${f.type==='date'?'date':f.type==='number'?'number':'text'}" value="${esc(v??'')}">`;
    return `<div class="fld"><label>${esc(f.label)}</label><div>${ctl}</div></div>`;
  }).join('');
  $('#mBody').querySelectorAll('[data-k]').forEach(el=>{
    const k=el.dataset.k,f=fieldOf(t,k);
    const ev=el.type==='checkbox'||el.tagName==='SELECT'?'change':'change';
    el.addEventListener(ev,async()=>{
      let nv;
      if(el.type==='checkbox')nv=el.checked;
      else if(el.dataset.tags)nv=el.value.split(',').map(x=>x.trim()).filter(Boolean);
      else if(f.type==='number'||f.type==='rating')nv=el.value===''?null:+el.value;
      else nv=el.value===''?null:el.value;
      await save(t,modalRec.id,{[k]:nv},true);
      if(k===CONFIG[t].title)$('#mTitle').textContent=el.value;
    });
  });
  $('#ov').classList.add('show');
}
$('#mClose').onclick=()=>$('#ov').classList.remove('show');
$('#ov').onclick=e=>{if(e.target.id==='ov')$('#ov').classList.remove('show');};
$('#mDel').onclick=async()=>{if(!modalRec)return;if(!confirm('Delete this record?'))return;
  const {error}=await sb.from(CONFIG[modalRec.t].table).delete().eq('id',modalRec.id);
  if(error){alert(error.message);return;}
  DATA[modalRec.t]=DATA[modalRec.t].filter(r=>r.id!==modalRec.id);$('#ov').classList.remove('show');render();};

/* ---------- save / add ---------- */
async function save(t,id,patch,inModal){
  const {error}=await sb.from(CONFIG[t].table).update(patch).eq('id',id);
  if(error){alert('Save failed: '+error.message);return;}
  Object.assign(DATA[t].find(r=>r.id===id),patch);
  if(inModal){$('#mSaved').textContent='saved ✓';setTimeout(()=>$('#mSaved').textContent='',1200);} else render();
}
async function addRow(){
  const t=cur,def={activities:{event_date:new Date().toISOString().slice(0,10),type:'other',headline:'New movement',reviewed:false,logged_by:'manual'},
    companies:{name:'New company',relevance:'radar',status:'WATCH'},contacts:{full_name:'New contact',status:'to-reach'},
    digest_items:{digest_date:new Date().toISOString().slice(0,10),section:'AI — General',headline:'New item'},
    conferences:{name:'New conference'}}[t];
  const {data,error}=await sb.from(CONFIG[t].table).insert(def).select().single();
  if(error){alert('Add failed: '+error.message);return;}
  DATA[t].unshift(data);render();openRecord(t,data.id);
}

/* ---------- toolbar panels ---------- */
function closePanels(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));}
function togglePanel(id,build){const p=$(id);const show=!p.classList.contains('show');closePanels();if(show){build();p.classList.add('show');}}
$('#btnGroup').onclick=()=>togglePanel('#groupPanel',()=>{
  const t=cur,groupable=CONFIG[t].fields.filter(f=>['select','text'].includes(f.type)&&!f.modal);
  $('#groupPanel').innerHTML=`<div class="lbl" style="margin-bottom:6px">Group by</div><select id="gSel" class="cond" style="width:100%"><option value="">none</option>${groupable.map(f=>`<option value="${f.k}" ${ST[t].group===f.k?'selected':''}>${esc(f.label)}</option>`).join('')}</select>`;
  $('#gSel').onchange=e=>{ST[t].group=e.target.value;render();};});
$('#btnSort').onclick=()=>togglePanel('#sortPanel',()=>{
  const t=cur,s=ST[t];
  $('#sortPanel').innerHTML=`<div class="lbl" style="margin-bottom:6px">Sort by</div>
    <select id="sCol" class="cond" style="width:60%">${gridFields(t).map(f=>`<option value="${f.k}" ${s.sort.col===f.k?'selected':''}>${esc(f.label)}</option>`).join('')}</select>
    <select id="sDir" class="cond" style="width:36%"><option value="1" ${s.sort.dir>0?'selected':''}>asc</option><option value="-1" ${s.sort.dir<0?'selected':''}>desc</option></select>`;
  $('#sCol').onchange=e=>{s.sort.col=e.target.value;render();};
  $('#sDir').onchange=e=>{s.sort.dir=+e.target.value;render();};});
$('#btnFilter').onclick=()=>togglePanel('#filterPanel',renderFilterPanel);
function renderFilterPanel(){
  const t=cur,s=ST[t];
  let h='<div class="lbl" style="margin-bottom:6px">Filters (all must match)</div>';
  s.filters.forEach((c,i)=>{h+=condHTML(t,c,i);});
  h+='<button class="addcond" id="addCond">+ add condition</button>';
  $('#filterPanel').innerHTML=h;
  $('#addCond').onclick=()=>{s.filters.push({field:gridFields(t)[0].k,op:'contains',val:''});renderFilterPanel();};
  $('#filterPanel').querySelectorAll('[data-fi]').forEach(el=>el.onchange=el.oninput=e=>{
    const i=+el.dataset.fi,key=el.dataset.fk;s.filters[i][key]=el.value;
    if(key==='field'){s.filters[i].op=defaultOp(fieldOf(t,el.value));}
    renderFilterPanel();render();});
  $('#filterPanel').querySelectorAll('.x').forEach(x=>x.onclick=()=>{s.filters.splice(+x.dataset.rm,1);renderFilterPanel();render();});
}
function opsFor(f){const ty=f.type;
  if(ty==='checkbox')return[['checked','is checked'],['unchecked','is unchecked']];
  if(ty==='select')return[['is','is'],['isnot','is not'],['empty','is empty'],['notempty','not empty']];
  if(ty==='number'||ty==='rating')return[['gte','≥'],['lte','≤'],['eq','=']];
  if(ty==='date')return[['on','on'],['before','before'],['after','after']];
  return[['contains','contains'],['is','is'],['empty','is empty'],['notempty','not empty']];}
const defaultOp=f=>opsFor(f)[0][0];
function condHTML(t,c,i){const f=fieldOf(t,c.field)||gridFields(t)[0];const ops=opsFor(f);
  const needVal=!['empty','notempty','checked','unchecked'].includes(c.op);
  let valCtl='';
  if(needVal){ if(f.type==='select')valCtl=`<select data-fi="${i}" data-fk="val">${['',...f.opts].map(o=>`<option ${c.val===o?'selected':''}>${o}</option>`).join('')}</select>`;
    else valCtl=`<input data-fi="${i}" data-fk="val" type="${f.type==='date'?'date':f.type==='number'||f.type==='rating'?'number':'text'}" value="${esc(c.val||'')}" style="width:90px">`;}
  return `<div class="cond"><select data-fi="${i}" data-fk="field">${gridFields(t).map(ff=>`<option value="${ff.k}" ${c.field===ff.k?'selected':''}>${esc(ff.label)}</option>`).join('')}</select>
    <select data-fi="${i}" data-fk="op">${ops.map(o=>`<option value="${o[0]}" ${c.op===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>${valCtl}<span class="x" data-rm="${i}">✕</span></div>`;
}
document.addEventListener('click',e=>{if(!e.target.closest('.panel')&&!e.target.closest('.tb'))closePanels();});

init();
</script>
